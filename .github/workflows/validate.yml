name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate skill package
        run: python3 scripts/validate_skill.py

